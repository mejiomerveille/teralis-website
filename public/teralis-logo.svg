<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E50C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A2F8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8DEFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0A2060" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fond rond -->
  <rect x="4" y="4" width="112" height="112" rx="28" ry="28" fill="url(#bgGrad)" />

  <!-- Reflet brillant en haut -->
  <ellipse cx="60" cy="28" rx="38" ry="16" fill="url(#shineGrad)" />

  <!-- Bande bleue claire style boîte -->
  <rect x="4" y="72" width="112" height="26" rx="0" fill="#1044AA" opacity="0.5" />
  <rect x="4" y="94" width="112" height="22" rx="0" ry="0" fill="#0A2F8A" opacity="0.6" />
  <!-- Arrondi bas -->
  <rect x="4" y="94" width="112" height="22" rx="28" ry="28" fill="#0A2F8A" opacity="0.6" />

  <!-- Lettre T -->
  <g filter="url(#shadow)">
    <!-- Barre horizontale -->
    <rect x="22" y="28" width="76" height="14" rx="7" fill="url(#tGrad)" />
    <!-- Barre verticale -->
    <rect x="49" y="28" width="22" height="62" rx="7" fill="url(#tGrad)" />
  </g>

  <!-- Petit point brillant -->
  <circle cx="85" cy="88" r="4" fill="#FFFFFF" opacity="0.25" />
  <circle cx="85" cy="88" r="2" fill="#FFFFFF" opacity="0.5" />
</svg>
